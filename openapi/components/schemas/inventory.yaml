InventoryLot:
  type: object
  required:
    - id
    - tenantId
    - itemId
    - warehouseId
    - lotCode
    - receivedAt
    - expiresAt
    - initialQuantity
    - currentQuantity
    - isActive
  properties:
    id:
      type: string
    tenantId:
      type: string
    itemId:
      type: string
    warehouseId:
      type: string
    lotCode:
      type: string
    receivedAt:
      type: string
      format: date-time
    expiresAt:
      type: string
      format: date-time
      nullable: true
    initialQuantity:
      type: integer
      minimum: 0
    currentQuantity:
      type: integer
      minimum: 0
    isActive:
      type: boolean
