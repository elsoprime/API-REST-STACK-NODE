        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    traceId:
      type: string
InventoryStockMovementSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - movement
      properties:
