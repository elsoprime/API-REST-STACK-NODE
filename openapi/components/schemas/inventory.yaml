  properties:
    lot:
      $ref: '#/InventoryLot'
    daysToExpiry:
      type: integer
InventoryCapabilities:
  type: object
  required:
    - warehouses
    - lots
    - stocktakes
  properties:
    warehouses:
      type: boolean
    lots:
      type: boolean
    stocktakes:
      type: boolean
InventorySettings:
  type: object
  required:
    - tenantId
    - lotAllocationPolicy
    - rolloutPhase
    - capabilities
  properties:
    tenantId:
      type: string
    lotAllocationPolicy:
      type: string
      enum: [FIFO, FEFO]
    rolloutPhase:
      type: string
      enum: [pilot, cohort, general]
    capabilities:
      $ref: '#/InventoryCapabilities'
CreateInventoryLotRequest:
  type: object
  required:
    - itemId
    - warehouseId
    - lotCode
    - quantity
  properties:
    itemId:
      type: string
      pattern: '^[a-fA-F0-9]{24}$'
    warehouseId:
      type: string
      pattern: '^[a-fA-F0-9]{24}$'
    lotCode:
      type: string
      minLength: 1
      maxLength: 80
      pattern: '^[a-zA-Z0-9._:-]+$'
    quantity:
      type: integer
      minimum: 1
    receivedAt:
      type: string
      format: date-time
    expiresAt:
      type: string
      format: date-time
      nullable: true
UpdateInventoryLotRequest:
