    - description
    - isActive
  properties:
    id:
      type: string
    tenantId:
      type: string
    name:
      type: string
    description:
      type: string
      nullable: true
    isActive:
      type: boolean
InventoryWarehouse:
  type: object
  required:
    - id
    - tenantId
    - name
    - description
    - isActive
  properties:
    id:
      type: string
    tenantId:
      type: string
    name:
      type: string
    description:
      type: string
      nullable: true
    isActive:
      type: boolean
InventoryItem:
  type: object
  required:
    - id
    - tenantId
    - categoryId
    - sku
    - name
    - description
    - currentStock
    - minStock
    - isLowStock
    - isActive
  properties:
    id:
      type: string
    tenantId:
      type: string
    categoryId:
      type: string
    sku:
      type: string
    name:
      type: string
    description:
      type: string
      nullable: true
    currentStock:
      type: integer
      minimum: 0
    minStock:
      type: integer
      minimum: 0
    isLowStock:
      type: boolean
    isActive:
      type: boolean
InventoryStockMovement:
  type: object
  required:
    - id
    - tenantId
    - itemId
    - direction
    - movementType
    - quantity
    - stockBefore
    - stockAfter
    - reason
    - warehouseId
    - sourceWarehouseId
    - destinationWarehouseId
    - idempotencyKey
    - performedByUserId
    - createdAt
  properties:
    id:
      type: string
    tenantId:
      type: string
    itemId:
      type: string
    direction:
      type: string
      enum: [in, out]
    movementType:
      type: string
      enum: [entry, exit, adjust, transfer, return]
    quantity:
      type: integer
      minimum: 1
    stockBefore:
      type: integer
      minimum: 0
    stockAfter:
      type: integer
      minimum: 0
    reason:
      type: string
    warehouseId:
      type: string
      nullable: true
    sourceWarehouseId:
      type: string
      nullable: true
    destinationWarehouseId:
      type: string
      nullable: true
    idempotencyKey:
      type: string
      nullable: true
    performedByUserId:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time
InventoryLowStockAlert:
  type: object
  required:
    - item
    - deficit
  properties:
    item:
      $ref: '#/InventoryItem'
    deficit:
      type: integer
      minimum: 0
