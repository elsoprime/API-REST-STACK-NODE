PlatformSettingsBranding:
  type: object
  required:
    - applicationName
    - supportEmail
    - supportUrl
  properties:
    applicationName:
      type: string
    supportEmail:
      type: string
      format: email
      nullable: true
    supportUrl:
      type: string
      format: uri
      nullable: true
PlatformSettingsLocalization:
  type: object
  required:
    - defaultTimezone
    - defaultCurrency
    - defaultLanguage
  properties:
    defaultTimezone:
      type: string
    defaultCurrency:
      type: string
      pattern: '^[A-Z]{3}$'
    defaultLanguage:
      type: string
PlatformSettingsPasswordPolicy:
  type: object
  required:
    - minLength
    - preventReuseCount
    - requireUppercase
    - requireLowercase
    - requireNumber
    - requireSpecialChar
  properties:
    minLength:
      type: integer
      minimum: 8
      maximum: 128
    preventReuseCount:
      type: integer
      minimum: 0
      maximum: 24
    requireUppercase:
      type: boolean
    requireLowercase:
      type: boolean
    requireNumber:
      type: boolean
    requireSpecialChar:
      type: boolean
PlatformSettingsSessionPolicy:
  type: object
  required:
    - browserSessionTtlMinutes
    - idleTimeoutMinutes
  properties:
    browserSessionTtlMinutes:
      type: integer
      minimum: 5
      maximum: 43200
    idleTimeoutMinutes:
      type: integer
      minimum: 1
      maximum: 43200
      nullable: true
PlatformSettingsRiskControls:
  type: object
  required:
    - allowRecoveryCodes
    - enforceVerifiedEmailForPrivilegedAccess
  properties:
    allowRecoveryCodes:
      type: boolean
    enforceVerifiedEmailForPrivilegedAccess:
      type: boolean
PlatformSettingsSecurity:
  type: object
  required:
    - allowUserRegistration
    - requireEmailVerification
    - requireTwoFactorForPrivilegedUsers
    - passwordPolicy
    - sessionPolicy
    - riskControls
  properties:
    allowUserRegistration:
      type: boolean
    requireEmailVerification:
      type: boolean
    requireTwoFactorForPrivilegedUsers:
      type: boolean
    passwordPolicy:
      $ref: '#/PlatformSettingsPasswordPolicy'
    sessionPolicy:
      $ref: '#/PlatformSettingsSessionPolicy'
    riskControls:
      $ref: '#/PlatformSettingsRiskControls'
PlatformSettingsOperations:
  type: object
  required:
    - maintenanceMode
  properties:
    maintenanceMode:
      type: boolean
PlatformSettingsModules:
  type: object
  required:
    - disabledModuleKeys
  properties:
    disabledModuleKeys:
      type: array
      items:
        type: string
PlatformSettingsFeatureFlags:
  type: object
  required:
    - disabledFeatureFlagKeys
  properties:
    disabledFeatureFlagKeys:
      type: array
      items:
        type: string
PlatformSettings:
  type: object
  required:
    - id
    - singletonKey
    - branding
    - localization
    - security
    - operations
    - modules
    - featureFlags
  properties:
    id:
      type: string
    singletonKey:
      type: string
      enum: [platform_settings]
    branding:
      $ref: '#/PlatformSettingsBranding'
    localization:
      $ref: '#/PlatformSettingsLocalization'
    security:
      $ref: '#/PlatformSettingsSecurity'
    operations:
      $ref: '#/PlatformSettingsOperations'
    modules:
      $ref: '#/PlatformSettingsModules'
    featureFlags:
      $ref: '#/PlatformSettingsFeatureFlags'
UpdatePlatformSettingsRequest:
  type: object
  minProperties: 1
  properties:
    branding:
      type: object
      properties:
        applicationName:
          type: string
        supportEmail:
          type: string
          format: email
          nullable: true
        supportUrl:
          type: string
          format: uri
          nullable: true
    localization:
      type: object
      properties:
        defaultTimezone:
          type: string
        defaultCurrency:
          type: string
          pattern: '^[A-Z]{3}$'
        defaultLanguage:
          type: string
    security:
      type: object
      properties:
        allowUserRegistration:
          type: boolean
        requireEmailVerification:
          type: boolean
        requireTwoFactorForPrivilegedUsers:
          type: boolean
        passwordPolicy:
          type: object
          properties:
            minLength:
              type: integer
              minimum: 8
              maximum: 128
            preventReuseCount:
              type: integer
              minimum: 0
              maximum: 24
            requireUppercase:
              type: boolean
            requireLowercase:
              type: boolean
            requireNumber:
              type: boolean
            requireSpecialChar:
              type: boolean
        sessionPolicy:
          type: object
          properties:
            browserSessionTtlMinutes:
              type: integer
              minimum: 5
              maximum: 43200
            idleTimeoutMinutes:
              type: integer
              minimum: 1
              maximum: 43200
              nullable: true
        riskControls:
          type: object
          properties:
            allowRecoveryCodes:
              type: boolean
            enforceVerifiedEmailForPrivilegedAccess:
              type: boolean
    operations:
      type: object
      properties:
        maintenanceMode:
          type: boolean
    modules:
      type: object
      properties:
        disabledModuleKeys:
          type: array
          items:
            type: string
    featureFlags:
      type: object
      properties:
        disabledFeatureFlagKeys:
          type: array
          items:
            type: string
PlatformSettingsSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - settings
      properties:
        settings:
          $ref: '#/PlatformSettings'
    traceId:
      type: string
