ExpenseRequestStatus:
  type: string
  enum: [draft, submitted, returned, approved, rejected, paid, canceled]

ExpenseApprovalMode:
  type: string
  enum: [single_step, multi_step]

ExpenseRequest:
  type: object
  required:
    - id
    - tenantId
    - requestNumber
    - requesterUserId
    - title
    - description
    - categoryKey
    - amount
    - currency
    - expenseDate
    - status
    - submittedAt
    - approvedAt
    - paidAt
    - canceledAt
    - rejectionReasonCode
    - paymentReference
    - metadata
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    tenantId:
      type: string
    requestNumber:
      type: string
    requesterUserId:
      type: string
    title:
      type: string
    description:
      type: string
      nullable: true
    categoryKey:
      type: string
    amount:
      type: number
      minimum: 0
    currency:
      type: string
      pattern: '^[A-Z]{3}$'
    expenseDate:
      type: string
      format: date-time
    status:
      $ref: '#/ExpenseRequestStatus'
    submittedAt:
      type: string
      format: date-time
      nullable: true
    approvedAt:
      type: string
      format: date-time
      nullable: true
    paidAt:
      type: string
      format: date-time
      nullable: true
    canceledAt:
      type: string
      format: date-time
      nullable: true
    rejectionReasonCode:
      type: string
      nullable: true
    paymentReference:
      type: string
      nullable: true
    metadata:
      type: object
      additionalProperties: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

ExpenseCategory:
  type: object
  required:
    - id
    - tenantId
    - key
    - name
    - requiresAttachment
    - isActive
    - monthlyLimit
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    tenantId:
      type: string
    key:
      type: string
    name:
      type: string
    requiresAttachment:
      type: boolean
    isActive:
      type: boolean
    monthlyLimit:
      type: number
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

ExpenseSettings:
  type: object
  required:
    - tenantId
    - allowedCurrencies
    - maxAmountWithoutReview
    - approvalMode
    - bulkMaxItemsPerOperation
    - exportsEnabled
    - createdAt
    - updatedAt
  properties:
    tenantId:
      type: string
    allowedCurrencies:
      type: array
      minItems: 1
      items:
        type: string
        pattern: '^[A-Z]{3}$'
    maxAmountWithoutReview:
      type: number
      minimum: 0
    approvalMode:
      $ref: '#/ExpenseApprovalMode'
    bulkMaxItemsPerOperation:
      type: integer
      minimum: 1
    exportsEnabled:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

ExpenseCounters:
  type: object
  required:
    - total
    - draft
    - submitted
    - returned
    - approved
    - rejected
    - paid
    - canceled
  properties:
    total:
      type: integer
      minimum: 0
    draft:
      type: integer
      minimum: 0
    submitted:
      type: integer
      minimum: 0
    returned:
      type: integer
      minimum: 0
    approved:
      type: integer
      minimum: 0
    rejected:
      type: integer
      minimum: 0
    paid:
      type: integer
      minimum: 0
    canceled:
      type: integer
      minimum: 0

CreateExpenseRequest:
  type: object
  required:
    - title
    - categoryKey
    - amount
    - currency
    - expenseDate
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 160
    description:
      type: string
      minLength: 1
      maxLength: 800
      nullable: true
    categoryKey:
      type: string
      minLength: 1
      maxLength: 80
    amount:
      type: number
      minimum: 0
    currency:
      type: string
      pattern: '^[A-Z]{3}$'
    expenseDate:
      type: string
      format: date-time
    metadata:
      type: object
      additionalProperties: true

UpdateExpenseRequest:
  type: object
  minProperties: 1
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 160
    description:
      type: string
      minLength: 1
      maxLength: 800
      nullable: true
    categoryKey:
      type: string
      minLength: 1
      maxLength: 80
    amount:
      type: number
      minimum: 0
    currency:
      type: string
      pattern: '^[A-Z]{3}$'
    expenseDate:
      type: string
      format: date-time
    metadata:
      type: object
      additionalProperties: true

CreateExpenseCategoryRequest:
  type: object
  required:
    - key
    - name
  properties:
    key:
      type: string
      minLength: 1
      maxLength: 80
      pattern: '^[a-zA-Z0-9._:-]+$'
    name:
      type: string
      minLength: 1
      maxLength: 120
    requiresAttachment:
      type: boolean
    monthlyLimit:
      type: number
      minimum: 0
      nullable: true

UpdateExpenseCategoryRequest:
  type: object
  minProperties: 1
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 120
    requiresAttachment:
      type: boolean
    isActive:
      type: boolean
    monthlyLimit:
      type: number
      minimum: 0
      nullable: true

UpdateExpenseSettingsRequest:
  type: object
  minProperties: 1
  properties:
    allowedCurrencies:
      type: array
      minItems: 1
      maxItems: 10
      items:
        type: string
        pattern: '^[A-Z]{3}$'
    maxAmountWithoutReview:
      type: number
      minimum: 0
    approvalMode:
      $ref: '#/ExpenseApprovalMode'
    bulkMaxItemsPerOperation:
      type: integer
      minimum: 1
      maximum: 1000
    exportsEnabled:
      type: boolean

ExpenseAttachment:
  type: object
  required:
    - id
    - tenantId
    - expenseRequestId
    - storageProvider
    - objectKey
    - originalFilename
    - mimeType
    - sizeBytes
    - checksumSha256
    - uploadedByUserId
    - isActive
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
    tenantId:
      type: string
    expenseRequestId:
      type: string
    storageProvider:
      type: string
    objectKey:
      type: string
    originalFilename:
      type: string
    mimeType:
      type: string
    sizeBytes:
      type: integer
      minimum: 1
    checksumSha256:
      type: string
      pattern: '^[a-fA-F0-9]{64}$'
    uploadedByUserId:
      type: string
    isActive:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

ExpenseUploadPresign:
  type: object
  required:
    - storageProvider
    - objectKey
    - uploadUrl
    - method
    - requiredHeaders
    - expiresInSeconds
  properties:
    storageProvider:
      type: string
    objectKey:
      type: string
    uploadUrl:
      type: string
    method:
      type: string
      enum: [PUT]
    requiredHeaders:
      type: object
      additionalProperties:
        type: string
    expiresInSeconds:
      type: integer
      minimum: 1

CreateExpenseUploadPresignRequest:
  type: object
  required:
    - requestId
    - originalFilename
    - mimeType
    - sizeBytes
  properties:
    requestId:
      type: string
      pattern: '^[a-fA-F0-9]{24}$'
    originalFilename:
      type: string
      minLength: 1
      maxLength: 240
    mimeType:
      type: string
      minLength: 1
      maxLength: 160
    sizeBytes:
      type: integer
      minimum: 1
      maximum: 26214400

CreateExpenseAttachmentRequest:
  type: object
  required:
    - storageProvider
    - objectKey
    - originalFilename
    - mimeType
    - sizeBytes
    - checksumSha256
  properties:
    storageProvider:
      type: string
      minLength: 1
      maxLength: 80
    objectKey:
      type: string
      minLength: 1
      maxLength: 500
    originalFilename:
      type: string
      minLength: 1
      maxLength: 240
    mimeType:
      type: string
      minLength: 1
      maxLength: 160
    sizeBytes:
      type: integer
      minimum: 1
      maximum: 26214400
    checksumSha256:
      type: string
      pattern: '^[a-fA-F0-9]{64}$'

ExpenseUploadPresignSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - upload
      properties:
        upload:
          $ref: '#/ExpenseUploadPresign'
    traceId:
      type: string

ExpenseAttachmentSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - attachment
      properties:
        attachment:
          $ref: '#/ExpenseAttachment'
    traceId:
      type: string

ExpenseAttachmentListSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/ExpenseAttachment'
    traceId:
      type: string
ReviewExpenseRequest:
  type: object
  required:
    - comment
  properties:
    comment:
      type: string
      minLength: 1
      maxLength: 1000

RejectExpenseRequest:
  type: object
  required:
    - reasonCode
  properties:
    reasonCode:
      type: string
      minLength: 1
      maxLength: 80
      pattern: '^[a-zA-Z0-9._:-]+$'
    comment:
      type: string
      minLength: 1
      maxLength: 1000

CancelExpenseRequest:
  type: object
  properties:
    reason:
      type: string
      minLength: 1
      maxLength: 1000

MarkPaidExpenseRequest:
  type: object
  properties:
    paymentReference:
      type: string
      minLength: 1
      maxLength: 120
ExpenseRequestSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - request
      properties:
        request:
          $ref: '#/ExpenseRequest'
    traceId:
      type: string

ExpenseRequestListSuccessResponse:
  type: object
  required:
    - success
    - data
    - pagination
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/ExpenseRequest'
    pagination:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    traceId:
      type: string

ExpenseCategorySuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - category
      properties:
        category:
          $ref: '#/ExpenseCategory'
    traceId:
      type: string

ExpenseCategoryListSuccessResponse:
  type: object
  required:
    - success
    - data
    - pagination
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/ExpenseCategory'
    pagination:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    traceId:
      type: string

ExpenseSettingsSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - settings
      properties:
        settings:
          $ref: '#/ExpenseSettings'
    traceId:
      type: string

ExpenseCountersSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - counters
      properties:
        counters:
          $ref: '#/ExpenseCounters'
    traceId:
      type: string

ExpenseBulkOperationItemResult:
  type: object
  required:
    - id
    - success
  properties:
    id:
      type: string
    success:
      type: boolean
    code:
      type: string
    message:
      type: string

ExpenseBulkOperationResult:
  type: object
  required:
    - processed
    - succeeded
    - failed
    - results
  properties:
    processed:
      type: integer
      minimum: 0
    succeeded:
      type: integer
      minimum: 0
    failed:
      type: integer
      minimum: 0
    results:
      type: array
      items:
        $ref: '#/ExpenseBulkOperationItemResult'

ExpenseExportRow:
  type: object
  required:
    - id
    - requestNumber
    - status
    - categoryKey
    - amount
    - currency
    - expenseDate
  properties:
    id:
      type: string
    requestNumber:
      type: string
    status:
      $ref: '#/ExpenseRequestStatus'
    categoryKey:
      type: string
    amount:
      type: number
    currency:
      type: string
    expenseDate:
      type: string
      format: date-time

ExpenseSummary:
  type: object
  required:
    - counters
    - totalRequestedAmount
    - totalApprovedAmount
    - totalPaidAmount
  properties:
    counters:
      $ref: '#/ExpenseCounters'
    totalRequestedAmount:
      type: number
      minimum: 0
    totalApprovedAmount:
      type: number
      minimum: 0
    totalPaidAmount:
      type: number
      minimum: 0

BulkApproveExpenseRequestsRequest:
  type: object
  required:
    - requestIds
  properties:
    requestIds:
      type: array
      minItems: 1
      maxItems: 500
      uniqueItems: true
      items:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'

BulkRejectExpenseRequestsRequest:
  type: object
  required:
    - requestIds
    - reasonCode
  properties:
    requestIds:
      type: array
      minItems: 1
      maxItems: 500
      uniqueItems: true
      items:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    reasonCode:
      type: string
      minLength: 1
      maxLength: 80
      pattern: '^[a-zA-Z0-9._:-]+$'
    comment:
      type: string
      minLength: 1
      maxLength: 1000

BulkMarkPaidExpenseRequestsRequest:
  type: object
  required:
    - requestIds
  properties:
    requestIds:
      type: array
      minItems: 1
      maxItems: 500
      uniqueItems: true
      items:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    paymentReference:
      type: string
      minLength: 1
      maxLength: 120

BulkExportExpenseRequestsRequest:
  type: object
  required:
    - requestIds
  properties:
    requestIds:
      type: array
      minItems: 1
      maxItems: 500
      uniqueItems: true
      items:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'

ExpenseBulkOperationSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - result
      properties:
        result:
          $ref: '#/ExpenseBulkOperationResult'
    traceId:
      type: string

ExpenseBulkExportSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - rows
      properties:
        rows:
          type: array
          items:
            $ref: '#/ExpenseExportRow'
    traceId:
      type: string

ExpenseSummarySuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - summary
      properties:
        summary:
          $ref: '#/ExpenseSummary'
    traceId:
      type: string
