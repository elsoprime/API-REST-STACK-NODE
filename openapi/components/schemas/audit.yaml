AuditActorUser:
  type: object
  required:
    - kind
    - userId
    - scope
  properties:
    kind:
      type: string
      enum: [user]
    userId:
      type: string
    sessionId:
      type: string
    scope:
      type: array
      items:
        type: string
AuditActorSystem:
  type: object
  required:
    - kind
    - systemId
    - label
  properties:
    kind:
      type: string
      enum: [system]
    systemId:
      type: string
    label:
      type: string
AuditActorUnknown:
  type: object
  required:
    - kind
    - reason
  properties:
    kind:
      type: string
      enum: [unknown]
    reason:
      type: string
      enum: [http_unauthenticated, external_unresolved, internal_unresolved]
AuditActor:
  oneOf:
    - $ref: '#/AuditActorUser'
    - $ref: '#/AuditActorSystem'
    - $ref: '#/AuditActorUnknown'
AuditTenantScope:
  type: object
  required:
    - tenantId
  properties:
    tenantId:
      type: string
    membershipId:
      type: string
    roleKey:
      type: string
    isOwner:
      type: boolean
    effectiveRoleKeys:
      type: array
      items:
        type: string
AuditResource:
  type: object
  required:
    - type
  properties:
    type:
      type: string
    id:
      type: string
    label:
      type: string
AuditChanges:
  type: object
  properties:
    before:
      type: object
      additionalProperties: true
      nullable: true
    after:
      type: object
      additionalProperties: true
      nullable: true
    fields:
      type: array
      items:
        type: string
AuditLog:
  type: object
  required:
    - id
    - scope
    - traceId
    - actor
    - action
    - resource
    - severity
    - createdAt
  properties:
    id:
      type: string
    scope:
      type: string
      enum: [platform, tenant]
    traceId:
      type: string
    actor:
      $ref: '#/AuditActor'
    tenant:
      $ref: '#/AuditTenantScope'
    action:
      type: string
    resource:
      $ref: '#/AuditResource'
    severity:
      type: string
      enum: [info, warning, critical]
    changes:
      $ref: '#/AuditChanges'
    metadata:
      type: object
      additionalProperties: true
    createdAt:
      type: string
      format: date-time
AuditLogListSuccessResponse:
  type: object
  required:
    - success
    - data
    - pagination
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/AuditLog'
    pagination:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    traceId:
      type: string

AuditMetricsShare:
  type: object
  required:
    - key
    - count
    - pct
  properties:
    key:
      type: string
    count:
      type: integer
      minimum: 0
    pct:
      type: number
      format: double
      minimum: 0
AuditMetricsPoint:
  type: object
  required:
    - bucketStart
    - bucketLabel
    - total
    - info
    - warning
    - critical
  properties:
    bucketStart:
      type: string
      format: date-time
    bucketLabel:
      type: string
    total:
      type: integer
      minimum: 0
    info:
      type: integer
      minimum: 0
    warning:
      type: integer
      minimum: 0
    critical:
      type: integer
      minimum: 0
AuditMetricsSummary:
  type: object
  required:
    - totalEvents
    - criticalEvents
    - criticalPct
    - previousTotal
    - trendPct
  properties:
    totalEvents:
      type: integer
      minimum: 0
    criticalEvents:
      type: integer
      minimum: 0
    criticalPct:
      type: number
      format: double
      minimum: 0
    previousTotal:
      type: integer
      minimum: 0
    trendPct:
      type: number
      format: double
TenantAuditMetrics:
  type: object
  required:
    - from
    - to
    - granularity
    - summary
    - trend
    - severityDistribution
    - topActions
    - topModules
  properties:
    from:
      type: string
      format: date-time
    to:
      type: string
      format: date-time
    granularity:
      type: string
      enum: [day, week]
    summary:
      $ref: '#/AuditMetricsSummary'
    trend:
      type: array
      items:
        $ref: '#/AuditMetricsPoint'
    severityDistribution:
      type: array
      items:
        $ref: '#/AuditMetricsShare'
    topActions:
      type: array
      items:
        $ref: '#/AuditMetricsShare'
    topModules:
      type: array
      items:
        $ref: '#/AuditMetricsShare'
AuditMetricsSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: '#/TenantAuditMetrics'
    traceId:
      type: string
