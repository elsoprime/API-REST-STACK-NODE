AuthenticatedUser:
  type: object
  required:
    - id
    - email
    - firstName
    - lastName
    - status
    - isEmailVerified
  properties:
    id:
      type: string
    email:
      type: string
      format: email
    firstName:
      type: string
    lastName:
      type: string
      nullable: true
    status:
      type: string
      enum: [active, pending_verification]
    isEmailVerified:
      type: boolean
AuthSession:
  type: object
  required:
    - id
    - userId
    - expiresAt
  properties:
    id:
      type: string
    userId:
      type: string
    expiresAt:
      type: string
      format: date-time
LoginRequest:
  type: object
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
    password:
      type: string
      minLength: 8
    twoFactorCode:
      type: string
      minLength: 6
      maxLength: 6
    recoveryCode:
      type: string
EmailVerificationStatus:
  type: object
  required:
    - required
    - expiresAt
  properties:
    required:
      type: boolean
      enum: [true]
    expiresAt:
      type: string
      format: date-time
      description: Expiration for the token delivered by the verification delivery channel.
VerifyEmailRequest:
  type: object
  required:
    - email
    - token
  properties:
    email:
      type: string
      format: email
    token:
      type: string
SetupTwoFactor:
  type: object
  required:
    - pending
  properties:
    pending:
      type: boolean
      enum: [true]
      description: Provisioning data has been delivered through the configured secure channel.
ConfirmTwoFactorRequest:
  type: object
  required:
    - code
  properties:
    code:
      type: string
      minLength: 6
      maxLength: 6
TwoFactorChallengeRequest:
  type: object
  properties:
    code:
      type: string
      minLength: 6
      maxLength: 6
    recoveryCode:
      type: string
  anyOf:
    - required: [code]
    - required: [recoveryCode]
BrowserAuthSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - user
        - session
      properties:
        user:
          $ref: '#/AuthenticatedUser'
        session:
          $ref: '#/AuthSession'
    traceId:
      type: string
HeadlessAuthSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - user
        - session
        - accessToken
        - refreshToken
      properties:
        user:
          $ref: '#/AuthenticatedUser'
        session:
          $ref: '#/AuthSession'
        accessToken:
          type: string
        refreshToken:
          type: string
    traceId:
      type: string
LogoutSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - revokedSessionIds
      properties:
        revokedSessionIds:
          type: array
          items:
            type: string
    traceId:
      type: string
VerifyEmailSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/AuthenticatedUser'
    traceId:
      type: string
SetupTwoFactorSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      $ref: '#/SetupTwoFactor'
    traceId:
      type: string
ConfirmTwoFactorSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          enum: [true]
    traceId:
      type: string
RegenerateRecoveryCodesSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - regenerated
      properties:
        regenerated:
          type: boolean
          enum: [true]
    traceId:
      type: string
DisableTwoFactorSuccessResponse:
  type: object
  required:
    - success
    - data
    - traceId
  properties:
    success:
      type: boolean
      enum: [true]
    data:
      type: object
      required:
        - disabled
      properties:
        disabled:
          type: boolean
          enum: [true]
    traceId:
      type: string
