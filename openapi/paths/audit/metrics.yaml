get:
  tags:
    - Audit
  summary: Get tenant-scoped audit metrics
  operationId: getTenantAuditMetrics
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: from
      in: query
      required: true
      schema:
        type: string
        format: date-time
    - name: to
      in: query
      required: true
      schema:
        type: string
        format: date-time
    - name: granularity
      in: query
      required: false
      schema:
        type: string
        enum: [day, week]
        default: day
    - name: module
      in: query
      required: false
      description: CSV or repeated module filter
      schema:
        type: string
        example: inventory,expenses
    - name: severity
      in: query
      required: false
      description: CSV or repeated severity filter
      schema:
        type: string
        example: warning,critical
    - name: topN
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 20
        default: 5
  responses:
    '200':
      description: Tenant audit aggregated metrics
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/audit.yaml#/AuditMetricsSuccessResponse
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
