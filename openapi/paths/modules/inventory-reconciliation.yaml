get:
  tags:
    - Inventory
  summary: Get inventory reconciliation report
  operationId: getInventoryReconciliation
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:read
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: sinceDays
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 30
        default: 1
  responses:
    '200':
      description: Inventory reconciliation report
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryReconciliationSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
