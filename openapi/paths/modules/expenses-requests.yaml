get:
  tags:
    - Expenses
  summary: List expense requests
  operationId: listExpenseRequests
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: status
      in: query
      required: false
      schema:
        $ref: ../../components/schemas/expenses.yaml#/ExpenseRequestStatus
    - name: categoryKey
      in: query
      required: false
      schema:
        type: string
    - name: search
      in: query
      required: false
      schema:
        type: string
  responses:
    '200':
      description: Expense requests list
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseRequestListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
post:
  tags:
    - Expenses
  summary: Create expense request
  operationId: createExpenseRequest
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating with access token cookie; not required for Bearer auth.
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/expenses.yaml#/CreateExpenseRequest
  responses:
    '201':
      description: Expense request created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseRequestSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
