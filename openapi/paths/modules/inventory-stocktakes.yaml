get:
  tags:
    - Inventory
  summary: List stocktakes
  operationId: listInventoryStocktakes
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:read
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: warehouseId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    - name: status
      in: query
      required: false
      schema:
        type: string
        enum: [draft, in_progress, review, applied, cancelled]
  responses:
    '200':
      description: Inventory stocktake list
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryStocktakeListSuccessResponse
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
post:
  tags:
    - Inventory
  summary: Create stocktake session
  operationId: createInventoryStocktake
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:stock:write
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/inventory.yaml#/CreateInventoryStocktakeRequest
  responses:
    '201':
      description: Inventory stocktake created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryStocktakeSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
