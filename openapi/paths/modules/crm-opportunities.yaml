get:
  tags:
    - CRM
  summary: List CRM opportunities
  operationId: listCrmOpportunities
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: search
      in: query
      required: false
      schema:
        type: string
    - name: stage
      in: query
      required: false
      schema:
        type: string
        enum: [lead, qualified, proposal, negotiation, won, lost]
    - name: contactId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    - name: organizationId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
  responses:
    '200':
      description: CRM opportunities list
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/crm.yaml#/CrmOpportunityListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
post:
  tags:
    - CRM
  summary: Create CRM opportunity
  operationId: createCrmOpportunity
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/crm.yaml#/CreateCrmOpportunityRequest
  responses:
    '201':
      description: CRM opportunity created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/crm.yaml#/CrmOpportunitySuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
