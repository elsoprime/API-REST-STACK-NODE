get:
  tags:
    - Expenses
  summary: List expense attachments
  operationId: listExpenseAttachments
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: requestId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
  responses:
    '200':
      description: Expense attachments list
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseAttachmentListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
post:
  tags:
    - Expenses
  summary: Register expense attachment metadata
  operationId: createExpenseAttachment
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating with access token cookie; not required for Bearer auth.
      schema:
        type: string
    - name: requestId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/expenses.yaml#/CreateExpenseAttachmentRequest
  responses:
    '201':
      description: Expense attachment created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseAttachmentSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
