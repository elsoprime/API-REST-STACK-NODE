post:
  tags:
    - Inventory
  summary: Register inventory stock movement
  operationId: createInventoryStockMovement
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:stock:write
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating with access token cookie; not required for Bearer auth.
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/inventory.yaml#/CreateInventoryStockMovementRequest
  responses:
    '201':
      description: Inventory stock movement created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryStockMovementSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
get:
  tags:
    - Inventory
  summary: List inventory stock movements
  operationId: listInventoryStockMovements
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:read
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: itemId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
  responses:
    '200':
      description: Inventory stock movements list
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryStockMovementListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
