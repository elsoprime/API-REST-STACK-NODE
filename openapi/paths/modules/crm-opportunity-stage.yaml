patch:
  tags:
    - CRM
  summary: Change CRM opportunity stage
  operationId: changeCrmOpportunityStage
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: opportunityId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    - name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/crm.yaml#/ChangeCrmOpportunityStageRequest
  responses:
    '200':
      description: CRM opportunity stage changed
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/crm.yaml#/CrmOpportunitySuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
