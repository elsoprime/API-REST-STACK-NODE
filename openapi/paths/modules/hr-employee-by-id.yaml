get:
  tags:
    - HR
  summary: Get HR employee
  operationId: getHrEmployee
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: employeeId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
  responses:
    '200':
      description: HR employee
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/hr.yaml#/HrEmployeeSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
patch:
  tags:
    - HR
  summary: Update HR employee
  operationId: updateHrEmployee
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: employeeId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    - name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating with access token cookie; not required for Bearer auth.
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/hr.yaml#/UpdateHrEmployeeRequest
  responses:
    '200':
      description: HR employee updated
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/hr.yaml#/HrEmployeeSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
delete:
  tags:
    - HR
  summary: Delete HR employee
  operationId: deleteHrEmployee
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: employeeId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    - name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating with access token cookie; not required for Bearer auth.
      schema:
        type: string
  responses:
    '200':
      description: HR employee deleted
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/hr.yaml#/HrEmployeeSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
