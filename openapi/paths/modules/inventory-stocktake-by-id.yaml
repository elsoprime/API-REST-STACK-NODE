get:
  tags:
    - Inventory
  summary: Get stocktake
  operationId: getInventoryStocktake
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:read
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: stocktakeId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
  responses:
    '200':
      description: Inventory stocktake
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryStocktakeSuccessResponse
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
