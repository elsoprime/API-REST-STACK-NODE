get:
  tags:
    - Expenses
  summary: Get expense settings
  operationId: getExpenseSettings
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
  responses:
    '200':
      description: Expense settings
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseSettingsSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
put:
  tags:
    - Expenses
  summary: Update expense settings
  operationId: updateExpenseSettings
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating with access token cookie; not required for Bearer auth.
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/expenses.yaml#/UpdateExpenseSettingsRequest
  responses:
    '200':
      description: Expense settings updated
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseSettingsSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
