get:
  tags:
    - Expenses
  summary: List expense categories
  operationId: listExpenseCategories
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: search
      in: query
      required: false
      schema:
        type: string
    - name: includeInactive
      in: query
      required: false
      schema:
        type: boolean
        default: false
  responses:
    '200':
      description: Expense categories list
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseCategoryListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
post:
  tags:
    - Expenses
  summary: Create expense category
  operationId: createExpenseCategory
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating with access token cookie; not required for Bearer auth.
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/expenses.yaml#/CreateExpenseCategoryRequest
  responses:
    '201':
      description: Expense category created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseCategorySuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
