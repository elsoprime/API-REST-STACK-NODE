get:
  tags:
    - Inventory
  summary: Get inventory settings
  operationId: getInventorySettings
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:read
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
  responses:
    '200':
      description: Inventory settings
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventorySettingsSuccessResponse
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
put:
  tags:
    - Inventory
  summary: Update inventory settings
  operationId: updateInventorySettings
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:update
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      description: Required when authenticating with access token cookie; not required for Bearer auth.
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/inventory.yaml#/UpdateInventorySettingsRequest
  responses:
    '200':
      description: Inventory settings updated
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventorySettingsSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
