post:
  tags:
    - Expenses
  summary: Bulk approve expense requests
  operationId: bulkApproveExpenseRequests
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/expenses.yaml#/BulkApproveExpenseRequestsRequest
  responses:
    '200':
      description: Bulk approve result
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseBulkOperationSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
