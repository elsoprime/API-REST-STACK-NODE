get:
  tags:
    - HR
  summary: List HR employees
  operationId: listHrEmployees
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: search
      in: query
      required: false
      schema:
        type: string
    - name: department
      in: query
      required: false
      schema:
        type: string
    - name: status
      in: query
      required: false
      schema:
        $ref: ../../components/schemas/hr.yaml#/HrEmployeeStatus
  responses:
    '200':
      description: HR employees list
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/hr.yaml#/HrEmployeeListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
post:
  tags:
    - HR
  summary: Create HR employee
  operationId: createHrEmployee
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/hr.yaml#/CreateHrEmployeeRequest
  responses:
    '201':
      description: HR employee created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/hr.yaml#/HrEmployeeSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
