get:
  tags:
    - Expenses
  summary: Get expenses summary report
  operationId: getExpensesSummary
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
  responses:
    '200':
      description: Expenses summary
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/expenses.yaml#/ExpenseSummarySuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
