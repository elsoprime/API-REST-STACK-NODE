get:
  tags:
    - Inventory
  summary: List inventory items
  operationId: listInventoryItems
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: categoryId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    - name: search
      in: query
      required: false
      schema:
        type: string
    - name: lowStockOnly
      in: query
      required: false
      schema:
        type: boolean
        default: false
  responses:
    '200':
      description: Inventory items list
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryItemListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
post:
  tags:
    - Inventory
  summary: Create inventory item
  operationId: createInventoryItem
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/inventory.yaml#/CreateInventoryItemRequest
  responses:
    '201':
      description: Inventory item created
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryItemSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '404':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
