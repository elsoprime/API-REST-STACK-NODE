get:
  tags:
    - Inventory
  summary: List expiring lot alerts
  operationId: listInventoryExpiringLotAlerts
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  x-permissions:
    module: tenant:modules:inventory:use
    required:
      - tenant:modules:inventory:read
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: withinDays
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 365
        default: 30
    - name: warehouseId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
    - name: itemId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[a-fA-F0-9]{24}$'
  responses:
    '200':
      description: Expiring lot alerts
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/inventory.yaml#/InventoryExpiringLotAlertListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
