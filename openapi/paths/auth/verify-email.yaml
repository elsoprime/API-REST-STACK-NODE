post:
  tags:
    - Auth
  summary: Verify the email address of a registered user using a token delivered by a secure external channel
  operationId: verifyEmail
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth.yaml#/VerifyEmailRequest
  responses:
    '200':
      description: Email verified
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth.yaml#/VerifyEmailSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
