post:
  tags:
    - Auth
  summary: Submit a platform registration request without revealing account existence
  operationId: registerPlatformUser
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
            - password
            - firstName
          properties:
            email:
              type: string
              format: email
            password:
              type: string
              minLength: 8
            firstName:
              type: string
            lastName:
              type: string
  responses:
    '202':
      description: Registration accepted. If the email is eligible, verification instructions are delivered through a secure external channel.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth.yaml#/EmailVerificationDispatchAcceptedResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
