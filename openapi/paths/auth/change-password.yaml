post:
  tags:
    - Auth
  summary: Change password for the authenticated user and revoke other sessions
  operationId: changePassword
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth.yaml#/ChangePasswordRequest
  responses:
    '200':
      description: Password changed and sibling sessions revoked
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth.yaml#/ChangePasswordSuccessResponse
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../components/responses/_index.yaml#/GenericError
