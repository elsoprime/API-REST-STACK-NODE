post:
  tags:
    - Auth
  summary: Request password reset instructions without revealing account state
  operationId: forgotPassword
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth.yaml#/ForgotPasswordRequest
  responses:
    '202':
      description: Request accepted. If the account is eligible, reset instructions are delivered through a secure external channel.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth.yaml#/EmailVerificationDispatchAcceptedResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
