post:
  tags:
    - Auth
  summary: Reset password using a valid one-time token
  operationId: resetPassword
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/auth.yaml#/ResetPasswordRequest
  responses:
    '200':
      description: Password reset completed and existing active sessions revoked
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/auth.yaml#/PasswordResetSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
