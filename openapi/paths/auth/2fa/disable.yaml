post:
  tags:
    - Auth
  summary: Disable TOTP using a current code or recovery code
  operationId: disableTwoFactor
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - name: X-CSRF-Token
      in: header
      required: false
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../../components/schemas/auth.yaml#/TwoFactorChallengeRequest
  responses:
    '200':
      description: TOTP disabled
      content:
        application/json:
          schema:
            $ref: ../../../components/schemas/auth.yaml#/DisableTwoFactorSuccessResponse
    '401':
      $ref: ../../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../../components/responses/_index.yaml#/GenericError
    '409':
      $ref: ../../../components/responses/_index.yaml#/GenericError
