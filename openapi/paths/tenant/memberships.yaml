get:
  tags:
    - TenantMemberships
  summary: List tenant memberships
  operationId: listTenantMemberships
  security:
    - bearerAuth: []
    - accessTokenCookie: []
  parameters:
    - $ref: ../../components/parameters/_index.yaml#/TenantIdHeader
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    - name: search
      in: query
      required: false
      schema:
        type: string
    - name: roleKey
      in: query
      required: false
      schema:
        type: string
    - name: status
      in: query
      required: false
      schema:
        type: string
        enum: [active, suspended]
  responses:
    '200':
      description: Tenant memberships page
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/tenant.yaml#/TenantMembershipListSuccessResponse
    '400':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '401':
      $ref: ../../components/responses/_index.yaml#/GenericError
    '403':
      $ref: ../../components/responses/_index.yaml#/GenericError
